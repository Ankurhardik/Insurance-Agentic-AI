services:
  postgres_main:
    image: postgres:15-alpine
    container_name: insurance_main_db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres123}
      POSTGRES_DB: ${POSTGRES_DB:-insurance_main}
    volumes:
      - ./postgres_data/main:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres_vector:
    image: pgvector/pgvector:pg15
    container_name: insurance_vector_db
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: ${VECTOR_POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${VECTOR_POSTGRES_PASSWORD:-postgres123}
      POSTGRES_DB: ${VECTOR_POSTGRES_DB:-insurance_vector}
    volumes:
      - ./postgres_data/vector:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
